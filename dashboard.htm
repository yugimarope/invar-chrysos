<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Invar Chrysos</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <nav class="bg-white shadow p-6">
    <div class="max-w-7xl mx-auto flex justify-between">
      <h1 class="text-3xl font-bold">Invar Chrysos - Admin Dashboard</h1>
      <a href="index.html" class="text-red-600">Logout</a>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-8">
    <h2 class="text-2xl font-bold mb-6">Recent Applications</h2>
    <div id="applicationsList" class="bg-white rounded-3xl shadow overflow-hidden"></div>
  </div>

  <script>
    function loadApplications() {
      const apps = JSON.parse(localStorage.getItem('applications')) || [];
      let html = `<table class="w-full"><thead class="bg-gray-50"><tr>
        <th class="p-4 text-left">Name</th>
        <th class="p-4 text-left">Amount</th>
        <th class="p-4 text-left">Date</th>
        <th class="p-4 text-left">Status</th>
      </tr></thead><tbody>`;

      apps.forEach(app => {
        html += `<tr class="border-t">
          <td class="p-4">${app.fullName}</td>
          <td class="p-4">BWP ${app.amount}</td>
          <td class="p-4">${app.date}</td>
          <td class="p-4"><span class="px-3 py-1 rounded-full text-sm ${app.status === 'Pending' ? 'bg-orange-100 text-orange-600' : 'bg-green-100 text-green-600'}">${app.status}</span></td>
        </tr>`;
      });
      html += `</tbody></table>`;
      document.getElementById('applicationsList').innerHTML = html;
    }
    loadApplications();
  </script>
</body>
</html>
