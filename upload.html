<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply for Loan - Invar Chrysos</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <nav class="bg-white shadow sticky top-0 z-50"> <!-- Same nav as index.html --></nav>
  
  <div class="max-w-2xl mx-auto mt-12 bg-white rounded-3xl shadow-2xl p-10">
    <h1 class="text-4xl font-bold text-center mb-8">Loan Application - Invar Chrysos</h1>
    <!-- Form content same as before -->
    <form>
      <div class="grid grid-cols-2 gap-6">
        <div><label class="block text-sm mb-1 font-medium">Full Name</label><input type="text" class="w-full border rounded-xl p-4" required></div>
        <div><label class="block text-sm mb-1 font-medium">ID / Omang No.</label><input type="text" class="w-full border rounded-xl p-4" required></div>
      </div>
      <div class="mt-6"><label class="block text-sm mb-1 font-medium">Phone Number</label><input type="tel" class="w-full border rounded-xl p-4" required></div>
      <div class="mt-6"><label class="block text-sm mb-1 font-medium">Loan Amount (BWP)</label><input type="number" class="w-full border rounded-xl p-4" required></div>
      <div class="mt-6"><label class="block text-sm mb-1 font-medium">Purpose of Loan</label><textarea class="w-full border rounded-xl p-4 h-32" required></textarea></div>
      
      <button type="button" onclick="window.location.href='upload.html'" class="mt-10 w-full bg-amber-600 hover:bg-amber-700 text-white py-5 rounded-2xl text-xl font-semibold">
        Next: Upload Documents & Selfie
      </button>
    </form>
  </div>
</body>
</html>
