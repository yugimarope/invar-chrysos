<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply for Loan - Invar Chrysos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50">
  <nav class="bg-white shadow sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 bg-amber-600 rounded-2xl flex items-center justify-center text-white text-3xl font-bold">IC</div>
        <h1 class="text-3xl font-bold">Invar Chrysos</h1>
      </div>
      <a href="index.html" class="text-gray-600">← Home</a>
    </div>
  </nav>

  <div class="max-w-2xl mx-auto mt-12 bg-white rounded-3xl shadow-2xl p-10">
    <h1 class="text-4xl font-bold text-center mb-8">Loan Application</h1>
    
    <form id="loanForm">
      <div class="grid grid-cols-2 gap-6">
        <div><label class="block mb-1 font-medium">Full Name</label><input type="text" id="fullName" class="w-full border rounded-xl p-4" required></div>
        <div><label class="block mb-1 font-medium">ID / Omang No.</label><input type="text" id="idNumber" class="w-full border rounded-xl p-4" required></div>
      </div>
      <div class="mt-6"><label class="block mb-1 font-medium">Phone Number</label><input type="tel" id="phone" class="w-full border rounded-xl p-4" required></div>
      <div class="mt-6"><label class="block mb-1 font-medium">Loan Amount (BWP)</label><input type="number" id="amount" class="w-full border rounded-xl p-4" required></div>
      <div class="mt-6"><label class="block mb-1 font-medium">Purpose of Loan</label><textarea id="purpose" class="w-full border rounded-xl p-4 h-32" required></textarea></div>

      <!-- Terms & Conditions -->
      <div class="mt-8 flex items-start gap-3 bg-amber-50 p-5 rounded-2xl">
        <input type="checkbox" id="terms" class="mt-1 w-5 h-5">
        <label for="terms" class="text-sm">
          I have read and agree to the <a href="agreement.html" target="_blank" class="text-amber-600 underline">Loan Agreement</a> and all terms & conditions.
        </label>
      </div>

      <button type="submit" id="submitBtn" disabled
              class="mt-8 w-full bg-amber-600 hover:bg-amber-700 text-white py-5 rounded-2xl text-xl font-semibold">
        Submit Application
      </button>
    </form>
  </div>

  <script>
    const supabaseUrl = 'https://woimqhzsxyfwqtstomez.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndvaW1xaHpzeHlmd3F0c3RvbWV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MzMwMjUsImV4cCI6MjA5NDIwOTAyNX0.iMhEYmOsIkpNeDhS4q1NpgdQT-xm4ZUz2Ibd8R3yVHU';

    const supabase = Supabase.createClient(supabaseUrl, supabaseKey);

    // Enable submit button only when terms are accepted
    document.getElementById('terms').addEventListener('change', function() {
      document.getElementById('submitBtn').disabled = !this.checked;
    });

    document.getElementById('loanForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const application = {
        full_name: document.getElementById('fullName').value.trim(),
        id_number: document.getElementById('idNumber').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        amount: parseFloat(document.getElementById('amount').value),
        purpose: document.getElementById('purpose').value.trim(),
      };

      const { error } = await supabase.from('loan_applications').insert([application]);

      if (error) {
        alert("Error: " + error.message);
      } else {
        alert("✅ Application Submitted Successfully!");
        window.location.href = 'confirmation.html';
      }
    });
  </script>
</body>
</html>
