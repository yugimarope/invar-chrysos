<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply - Invar Chrysos</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">

  <h1 class="text-4xl font-bold text-center mb-10">Loan Application</h1>

  <div class="max-w-xl mx-auto bg-white rounded-3xl shadow-xl p-10">
    
    <button onclick="showAgreement()" 
            class="w-full bg-blue-600 hover:bg-blue-700 text-white py-6 rounded-2xl text-xl font-bold mb-8">
      📜 Read Full Loan Agreement
    </button>

    <p class="text-center text-gray-500">Click the button above to test the pop-up</p>
  </div>

  <!-- Agreement Pop-up -->
  <div id="agreementModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-3xl max-w-3xl w-full max-h-[90vh] overflow-hidden">
      <div class="p-6 border-b flex justify-between items-center bg-gray-50">
        <h2 class="text-2xl font-bold">Loan Agreement - Invar Chrysos</h2>
        <button onclick="hideAgreement()" class="text-4xl leading-none">×</button>
      </div>
      <div class="p-8 overflow-y-auto max-h-[70vh] text-sm leading-relaxed">
        <p>Your full Loan Agreement content goes here...</p>
        <p>Paste the complete agreement text in this section.</p>
      </div>
      <div class="p-6 border-t">
        <button onclick="hideAgreement()" 
                class="w-full bg-amber-600 text-white py-5 rounded-2xl font-semibold">
          Close Agreement
        </button>
      </div>
    </div>
  </div>

  <script>
    function showAgreement() {
      document.getElementById('agreementModal').classList.remove('hidden');
      console.log("Agreement modal opened");
    }

    function hideAgreement() {
      document.getElementById('agreementModal').classList.add('hidden');
    }
  </script>
</body>
</html>
