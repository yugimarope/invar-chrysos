<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply - Invar Chrysos</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <h1 class="text-4xl font-bold text-center mb-8">Loan Application</h1>
  
  <form id="testForm">
    <input type="text" id="name" placeholder="Full Name" class="w-full border p-4 rounded-xl mb-4" required>
    <input type="number" id="amount" placeholder="Amount" class="w-full border p-4 rounded-xl mb-4" required>
    
    <button type="button" onclick="testClick()" 
            class="w-full bg-green-600 text-white py-6 rounded-2xl text-xl font-bold">
      TEST BUTTON - Click Me
    </button>
  </form>

  <script>
    function testClick() {
      alert("✅ Button is working! JavaScript is running.");
    }

    console.log("JavaScript loaded successfully");
  </script>
</body>
</html>
